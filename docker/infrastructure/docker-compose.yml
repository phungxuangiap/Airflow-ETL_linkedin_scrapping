version: '3.8'

services:
  # MinIO - S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - data-pipeline-network

  # PostgreSQL - Iceberg catalog metadata store
  postgres-iceberg:
    image: postgres:15-alpine
    container_name: postgres-iceberg
    environment:
      POSTGRES_DB: iceberg_catalog
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg123
    volumes:
      - postgres_iceberg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-pipeline-network

  # PostgreSQL - Raw ingestion records store
  postgres-ingestion:
    image: postgres:15-alpine
    container_name: postgres-ingestion
    environment:
      POSTGRES_DB: ${INGESTION_POSTGRES_DB:-ingestion}
      POSTGRES_USER: ${INGESTION_POSTGRES_USER:-ingestion}
      POSTGRES_PASSWORD: ${INGESTION_POSTGRES_PASSWORD:-ingestion123}
    volumes:
      - postgres_ingestion_data:/var/lib/postgresql/data
      - ./postgres-ingestion-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-pipeline-network

  # pgAdmin - PostgreSQL management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres-ingestion:
        condition: service_healthy
    networks:
      - data-pipeline-network

  # MinIO Client - Initialize buckets
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/airflow-bucket --ignore-existing;
      mc mb myminio/iceberg-warehouse --ignore-existing;
      echo 'MinIO buckets initialized';
      "
    networks:
      - data-pipeline-network

volumes:
  minio_data:
    driver: local
  postgres_iceberg_data:
    driver: local
  postgres_ingestion_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  data-pipeline-network:
    external: true
