name: Down Production EC2

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DOWN_PROD to stop production services
        required: true
        type: string

jobs:
  down:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'DOWN_PROD' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Down production services
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          PROJECT_DIR: /opt/linkedin-jobs-etl
          REPO_URL: https://github.com/phungxuangiap/Airflow-ETL_linkedin_scrapping.git
        run: |
          ssh "$EC2_USER@$EC2_HOST" \
            "PROJECT_DIR='$PROJECT_DIR' REPO_URL='$REPO_URL' bash -s" << 'EOF'
            set -e

            echo "🛑 Starting production shutdown..."

            if ! command -v git >/dev/null 2>&1; then
              echo "Installing git..."
              sudo dnf install -y git
            fi

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "📦 Cloning repository..."
              sudo mkdir -p "$(dirname "$PROJECT_DIR")"
              sudo chown -R "$USER:$USER" "$(dirname "$PROJECT_DIR")"
              rm -rf "$PROJECT_DIR"
              git clone "$REPO_URL" "$PROJECT_DIR"
            else
              echo "📥 Syncing latest code..."
              cd "$PROJECT_DIR"
              git fetch origin main
              git checkout main
              git reset --hard origin/main
            fi

            cd "$PROJECT_DIR"
            chmod +x scripts/prod-down.sh
            ./scripts/prod-down.sh
          EOF

      - name: Notify on success
        if: success()
        run: echo "✅ Production services stopped successfully!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Production shutdown failed!"
