name: Destroy and Renew Production EC2

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type RENEW_PROD to destroy production volumes and redeploy
        required: true
        type: string

jobs:
  renew:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'RENEW_PROD' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Destroy and renew production
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PROJECT_DIR: /opt/linkedin-jobs-etl
          REPO_URL: https://github.com/phungxuangiap/Airflow-ETL_linkedin_scrapping.git
          CONFIRM_RENEW_PROD: ${{ github.event.inputs.confirm }}
        run: |
          GROQ_API_KEY_B64="$(printf '%s' "$GROQ_API_KEY" | base64 -w 0)"
          ssh "$EC2_USER@$EC2_HOST" \
            "PROJECT_DIR='$PROJECT_DIR' REPO_URL='$REPO_URL' CONFIRM_RENEW_PROD='$CONFIRM_RENEW_PROD' GROQ_API_KEY_B64='$GROQ_API_KEY_B64' bash -s" << 'EOF'
            set -e

            export GROQ_API_KEY="$(printf '%s' "$GROQ_API_KEY_B64" | base64 -d)"

            echo "♻️  Starting destructive production renew..."

            if ! command -v git >/dev/null 2>&1; then
              echo "Installing git..."
              sudo dnf install -y git
            fi

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "📦 Cloning repository..."
              sudo mkdir -p "$(dirname "$PROJECT_DIR")"
              sudo chown -R "$USER:$USER" "$(dirname "$PROJECT_DIR")"
              rm -rf "$PROJECT_DIR"
              git clone "$REPO_URL" "$PROJECT_DIR"
            else
              echo "📥 Syncing latest code..."
              cd "$PROJECT_DIR"
              git fetch origin main
              git checkout main
              git reset --hard origin/main
            fi

            cd "$PROJECT_DIR"
            chmod +x scripts/prod-renew.sh
            ./scripts/prod-renew.sh
          EOF

      - name: Verify renewed deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          PROJECT_DIR: /opt/linkedin-jobs-etl
        run: |
          ssh "$EC2_USER@$EC2_HOST" "PROJECT_DIR='$PROJECT_DIR' bash -s" << 'EOF'
            cd "$PROJECT_DIR"
            ./scripts/health-check.sh
          EOF

      - name: Notify on success
        if: success()
        run: echo "✅ Production renew completed successfully!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Production renew failed!"
