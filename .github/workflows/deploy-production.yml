name: Deploy to Production EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PROJECT_DIR: /opt/linkedin-jobs-etl
          REPO_URL: https://github.com/phungxuangiap/Airflow-ETL_linkedin_scrapping.git
        run: |
          ssh $EC2_USER@$EC2_HOST "PROJECT_DIR='$PROJECT_DIR' REPO_URL='$REPO_URL' DEEPSEEK_API_KEY='$DEEPSEEK_API_KEY' bash -s" << 'EOF'
            set -e

            echo "🚀 Starting deployment for infrastructure, Trino, and Airflow..."

            if ! command -v git >/dev/null 2>&1; then
              echo "Installing git..."
              sudo dnf install -y git
            fi

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "📦 Cloning repository..."
              sudo mkdir -p "$(dirname "$PROJECT_DIR")"
              sudo chown -R "$USER:$USER" "$(dirname "$PROJECT_DIR")"
              rm -rf "$PROJECT_DIR"
              git clone "$REPO_URL" "$PROJECT_DIR"
            else
              echo "📥 Syncing latest code..."
              cd "$PROJECT_DIR"
              git fetch origin main
              git checkout main
              git reset --hard origin/main
            fi

            cd "$PROJECT_DIR"

            echo "🔧 Running deployment script..."
            chmod +x scripts/prod-deploy.sh
            ./scripts/prod-deploy.sh

            echo "✅ Deployment completed!"
          EOF

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          PROJECT_DIR: /opt/linkedin-jobs-etl
        run: |
          ssh $EC2_USER@$EC2_HOST "PROJECT_DIR='$PROJECT_DIR' bash -s" << 'EOF'
            cd "$PROJECT_DIR"
            ./scripts/health-check.sh
          EOF

      - name: Notify on success
        if: success()
        run: echo "✅ Deployment to production successful!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment to production failed!"
